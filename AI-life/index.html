                extend: {

                        'spin': 'spin 1s linear infinite',

                    keyframes: {
                        in: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },

                        slideFromBottom8: { '0%': { opacity: '0', transform: 'translateY(2rem)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideFromLeft4: { '0%': { opacity: '0', transform: 'translateX(-1rem)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' } },
                        zoomIn95: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1',
                            transform: 'scale(1)' } },
                        slideFromTop2: { '0%': { opacity: '0', transform: 'translateY(-0.5rem)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>

        // ==========================================
        // 1. 常量与存储工具
        // ==========================================
        const STORAGE_KEYS = {
            SAVE: 'life_restart_save_v2',
            API_CONFIG: 'life_restart_api_config_v2',
            AVAILABLE_MODELS: 'life_restart_available_models_v2',
            PAST_RECORDS: 'life_restart_past_records',
        };

        const saveToStorage = (key, data) => {
            try {
                localStorage.setItem(key, JSON.stringify(data));
                return true;
            } catch (e) {
                console.warn('存储失败:', e.message);
                return false;
            }
        };

        const loadFromStorage = (key) => {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                return JSON.parse(raw);
            } catch (e) {
                console.warn('读取存储失败:', e.message);
                localStorage.removeItem(key);
                return null;
            }
        };

        const clearStorage = (key) => {
            try {
                localStorage.removeItem(key);
            } catch (e) { /* ignore */ }
        };

        const clearAllSaves = () => {
            Object.values(STORAGE_KEYS).forEach(k => clearStorage(k));
        };

        // ==========================================
        // 2. API通信与推演逻辑
        // ==========================================
        const defaultApiKey = "";

        /**
         * 检测API类型
         */
        const detectApiType = (url) => {
            if (!url) return 'openai';
            const lower = url.toLowerCase();
            if (lower.includes('generativelanguage.googleapis.com') || lower.includes('gemini')) {
                return 'gemini';
            }
            return 'openai';
        };

        /**
         * 带智能重试的fetch
         */
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            let lastError;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        // 401/403/400 不重试
                        if (response.status === 401 || response.status === 403 || response.status === 400) {
                            const errorData = await response.json().catch(() => ({}));
                            const msg = errorData?.error?.message || errorData?.message || `HTTP ${response.status}`;
                            throw new Error(msg + ' (请检查API Key和设置)');
                        }
                        // 429和5xx重试
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData?.error?.message || errorData?.message ||
                            `HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    lastError = error;
                    // 如果是认证/权限错误，不重试
                    if (error.message.includes('请检查API Key')) throw error;
                    console.warn(`请求尝试 ${i + 1} 失败:`, error.message);
                    if (i < retries - 1) await new Promise(res => setTimeout(res, delays[i]));
                }
            }
            throw lastError;
        }

        /**
         * 将Gemini风格的schema转换为文本描述（用于OpenAI格式）
         */
        const schemaToText = (schema, indent = 0) => {
            if (!schema) return '';
            const pad = '  '.repeat(indent);
            let text = '';
            if (schema.type === 'OBJECT' && schema.properties) {
                text += '{\n';
                const reqSet = new Set(schema.required || []);
                for (const [key, prop] of Object.entries(schema.properties)) {
                    const isReq = reqSet.has(key);
                    text += `${pad}  "${key}": `;
                    if (prop.type === 'STRING') {
                        if (prop.enum) {
                            text += `"${prop.enum.join('" | "')}"`;
                        } else {
                            text += 'string';
                        }
                    } else if (prop.type === 'INTEGER') {
                        text += 'integer';
                    } else if (prop.type === 'BOOLEAN') {
                        text += 'boolean';
                    } else if (prop.type === 'ARRAY') {
                        text += '[\n';
                        if (prop.items) {
                            text += schemaToText(prop.items, indent + 2);
                        }
                        text += `${pad}  ]`;
                    } else if (prop.type === 'OBJECT') {
                        text += schemaToText(prop, indent + 1);
                    } else {
                        text += prop.type || 'any';
                    }
                    if (!isReq) text += ' (可选)';
                    text += ',\n';
                }
                text += `${pad}}`;
            } else if (schema.type === 'ARRAY' && schema.items) {
                text += '[\n';
                text += schemaToText(schema.items, indent + 1);
                text += `\n${pad}]`;
            }
            return text;
        };

        /**
         * 通用AI调用函数 - 同时支持Gemini和OpenAI格式
         */
        const callAI = async (promptText, systemInstruction, schema, apiConfig) => {
            const keyToUse = apiConfig?.key || defaultApiKey;
            const baseUrl = (apiConfig?.url || "https://generativelanguage.googleapis.com").replace(/\/$/, "");
            const apiType = apiConfig?.apiType || detectApiType(baseUrl);

            if (apiType === 'gemini') {
                // Gemini格式
                const modelPath = apiConfig?.model?.startsWith("models/") ? apiConfig.model :
                    `models/${apiConfig?.model || 'gemini-2.5-flash-preview-09-2025'}`;
                const url =
                    `${baseUrl}/v1beta/${modelPath}:generateContent?key=${encodeURIComponent(keyToUse)}`;
                const payload = {
                    contents: [{ parts: [{ text: promptText }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: schema
                    }
                };
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("AI未能生成有效的内容");
                return JSON.parse(text);
            } else {
                // OpenAI兼容格式
                const apiPath = baseUrl.endsWith('/v1') ? '/chat/completions' : '/v1/chat/completions';
                const url = `${baseUrl}${apiPath}`;

                // 将schema描述嵌入system instruction
                let enhancedSystem = systemInstruction;
                if (schema) {
                    const schemaDesc = schemaToText(schema);
                    enhancedSystem +=
                        `\n\n【重要】你必须严格按照以下JSON格式返回响应，不要包含任何其他文字，只返回纯JSON：\n${schemaDesc}\n请确保返回的是有效的、可被JSON.parse解析的JSON对象。`;
                } else {
                    enhancedSystem += '\n\n【重要】请以JSON格式返回响应。';
                }

                const messages = [
                    { role: 'system', content: enhancedSystem },
                    { role: 'user', content: promptText + '\n\n请严格按照上述JSON格式返回，只返回JSON，不要包含markdown代码块标记。' }
                ];

                const payload = {
                    model: apiConfig?.model || 'gpt-4o',
                    messages: messages,
                    response_format: { type: "json_object" },
                    temperature: 0.8,
                    max_tokens: 4096,
                };

                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${keyToUse}`
                    },
                    body: JSON.stringify(payload)
                });

                let text = data.choices?.[0]?.message?.content;
                if (!text) throw new Error("AI未能生成有效的内容");

                // 清理可能的markdown代码块
                text = text.trim();
                if (text.startsWith('```json')) {
                    text = text.slice(7);
                } else if (text.startsWith('```')) {
                    text = text.slice(3);
                }
                if (text.endsWith('```')) {
                    text = text.slice(0, -3);
                }
                text = text.trim();

                try {
                    return JSON.parse(text);
                } catch (parseErr) {
                    console.error('JSON解析失败，原始响应:', text);
                    throw new Error('AI返回的内容无法解析为JSON，请重试');
                }

        // 获取模型列表

            const baseUrl = (apiConfig?.url || "https://generativelanguage.googleapis.com").replace(/\/$/, "");
            const apiType = apiConfig?.apiType || detectApiType(baseUrl);

            if (apiType === 'gemini') {
                const url = `${baseUrl}/v1beta/models?key=${encodeURIComponent(keyToUse)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("获取模型列表失败，请检查 API Key 和 URL");
                const data = await response.json();
                return data.models
                    .filter(m => m.supportedGenerationMethods?.includes("generateContent"))
                    .map(m => m.name.replace("models/", ""));
            } else {
                const apiPath = baseUrl.endsWith('/v1') ? '/models' : '/v1/models';
                const url = `${baseUrl}${apiPath}`;
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${keyToUse}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData?.error?.message || `获取模型列表失败 (HTTP ${response.status})`);
                }
                const data = await response.json();
                // OpenAI格式返回 { data: [{ id: "model-name" }] }
                if (data.data && Array.isArray(data.data)) {
                    return data.data.map(m => m.id).filter(id => id && typeof id === 'string');

                if (data.models && Array.isArray(data.models)) {
